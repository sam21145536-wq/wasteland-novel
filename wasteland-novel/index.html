<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>废土之上 - 末日生存小说</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #e8e8e8;
            --text-secondary: #999;
            --accent: #ff6b35;
            --border: #333;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 100vh;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(13,13,13,0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; max-width: 480px; margin: 0 auto;
        }
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
        .main { padding-top: 60px; max-width: 480px; margin: 0 auto; }
        .hero {
            padding: 40px 20px; text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        .book-cover {
            width: 160px; height: 220px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #2d1810 0%, #1a0f08 50%, #0d0805 100%);
            border-radius: 8px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 40px rgba(255,107,53,0.2);
        }
        .cover-title {
            writing-mode: vertical-rl; text-orientation: upright;
            font-size: 28px; font-weight: 700; letter-spacing: 8px;
            color: var(--accent); text-shadow: 0 0 20px rgba(255,107,53,0.5);
        }
        .book-info h1 { font-size: 26px; margin-bottom: 8px; }
        .author { color: var(--text-secondary); font-size: 14px; margin-bottom: 16px; }
        .stats {
            display: flex; justify-content: center; gap: 30px;
            margin-bottom: 24px;
        }
        .stat { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); }
        .read-btn {
            display: inline-block; padding: 14px 48px;
            background: var(--accent); color: white;
            text-decoration: none; font-size: 16px; font-weight: 600;
            border-radius: 4px; letter-spacing: 2px;
        }
        .intro {
            padding: 30px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .section-title {
            font-size: 14px; color: var(--accent);
            letter-spacing: 2px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }
        .intro-text {
            font-size: 14px; color: var(--text-secondary);
            line-height: 2; text-align: justify;
        }
        .chapters { padding: 30px 20px; }
        .chapter-list { display: flex; flex-direction: column; gap: 12px; }
        .chapter-item {
            display: flex; align-items: center;
            padding: 16px 20px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 8px;
            text-decoration: none; color: var(--text-primary);
            transition: all 0.3s;
        }
        .chapter-item:hover { border-color: var(--accent); }
        .chapter-num {
            font-size: 12px; color: var(--accent);
            margin-right: 16px; font-weight: 600; min-width: 36px;
        }
        .chapter-name { flex: 1; font-size: 15px; }
        .chapter-status {
            font-size: 11px; padding: 4px 10px;
            background: rgba(255,107,53,0.15); color: var(--accent);
            border-radius: 2px;
        }
        footer {
            padding: 30px 20px; text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-secondary); font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <span class="logo">废土之上</span>
        </div>
    </div>

    <div class="main">
        <section class="hero">
            <div class="book-cover">
                <span class="cover-title">废土之上</span>
            </div>
            <div class="book-info">
                <h1>废土之上</h1>
                <p class="author">作者：铁三角</p>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">3</div>
                        <div class="stat-label">章节</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">1.2万</div>
                        <div class="stat-label">字数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">连载中</div>
                        <div class="stat-label">状态</div>
                    </div>
                </div>
                <a href="chapter1.html" class="read-btn">开始阅读</a>
            </div>
        </section>

        <section class="intro">
            <h2 class="section-title">作品简介</h2>
            <p class="intro-text">
                2087年，世界已经崩塌。核战、瘟疫、变异——人类文明在一夜之间倒退百年。
                林野，一个拥有"读取"能力的觉醒者，在废墟中挣扎求生。
                直到他遇到了苏晴，一个能感知生命体征的女医生。
                两个孤独的灵魂，一辆破车，一段向着未知绿洲的旅程。
                在这个弱肉强食的废土世界，信任比黄金更珍贵，而希望，是支撑人们活下去的唯一理由。
            </p>
        </section>

        <section class="chapters">
            <h2 class="section-title">章节目录</h2>
            <div class="chapter-list">
                <a href="chapter1.html" class="chapter-item">
                    <span class="chapter-num">001</span>
                    <span class="chapter-name">铁皮蜗牛</span>
                    <span class="chapter-status">已发布</span>
                </a>
                <a href="chapter2.html" class="chapter-item">
                    <span class="chapter-num">002</span>
                    <span class="chapter-name">绿洲没有水</span>
                    <span class="chapter-status">已发布</span>
                </a>
                <a href="chapter3.html" class="chapter-item">
                    <span class="chapter-num">003</span>
                    <span class="chapter-name">第一次升级</span>
                    <span class="chapter-status">已发布</span>
                </a>
            </div>
        </section>

        <footer>
            <p>© 2026 废土之上 · 末日生存小说</p>
        </footer>
    </div>
</body>
</html>
