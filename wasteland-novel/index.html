<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废土之上 - 末日生存小说</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0d0d0d; --bg-secondary: #1a1a1a; --bg-card: #242424; --text-primary: #e8e8e8; --text-secondary: #999; --accent: #ff6b35; --border: #333; }
        body { font-family: 'Noto Serif SC', serif; background: linear-gradient(180deg, #0d0d0d 0%, #1a0f08 100%); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .book-cover { width: 180px; height: 260px; margin: 0 auto 40px; background: linear-gradient(135deg, #2d1810 0%, #1a0f08 50%, #0d0805 100%); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 3px solid var(--accent); box-shadow: 0 20px 60px rgba(255,107,53,0.3); }
        .cover-title { writing-mode: vertical-rl; text-orientation: upright; font-size: 36px; font-weight: 700; letter-spacing: 12px; color: var(--accent); text-shadow: 0 0 30px rgba(255,107,53,0.6); }
        .book-title { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 12px; letter-spacing: 4px; }
        .author { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 40px; }
        .intro { background: var(--bg-card); padding: 24px 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 40px; }
        .intro-text { font-size: 14px; color: var(--text-secondary); line-height: 2; text-align: justify; }
        .btn-group { display: flex; flex-direction: column; gap: 16px; }
        .btn { display: block; padding: 18px 48px; text-align: center; text-decoration: none; font-size: 18px; font-weight: 600; border-radius: 8px; letter-spacing: 3px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #ff8c5a 100%); color: white; box-shadow: 0 8px 30px rgba(255,107,53,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,107,53,0.4); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        footer { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 12px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div class="book-cover"><span class="cover-title">废土之上</span></div>
        <h1 class="book-title">废土之上</h1>
        <p class="author">作者：廖志伟伟伟伟伟</p>
        <div class="intro">
            <p class="intro-text">
                2087 年，世界已经崩塌。核战、瘟疫、变异——人类文明在一夜之间倒退百年。
                林野，一个拥有"读取"能力的觉醒者，在废墟中挣扎求生。
                直到他遇到了苏晴，一个能感知生命体征的女医生。
                两个孤独的灵魂，一辆破车，一段向着未知绿洲的旅程。
            </p>
        </div>
        <div class="btn-group">
            <a href="../catalog.html" class="btn btn-primary">开始阅读</a>
            <a href="../catalog.html" class="btn btn-secondary">章节目录</a>
        </div>
    </div>
    <footer>© 2026 废土之上 · 废土小说</footer>
</body>
</html>
