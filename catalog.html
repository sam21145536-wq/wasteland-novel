    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0d0d0d; --bg-secondary: #1a1a1a; --bg-card: #242424; --text-primary: #e8e8e8; --text-secondary: #999; --accent: #ff6b35; --border: #333; }
        body { font-family: 'Noto Serif SC', serif; background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { position: sticky; top: 0; background: rgba(13,13,13,0.98); z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; max-width: 480px; margin: 0 auto; }
        .back-btn { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; }
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 20px; letter-spacing: 3px; text-align: center; padding: 20px 0; }
        .chapter-list { display: flex; flex-direction: column; gap: 10px; }
        .chapter-item { display: flex; align-items: center; padding: 18px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text-primary); transition: all 0.3s; }
        .chapter-item:hover { border-color: var(--accent); transform: translateX(4px); }
        .chapter-num { font-size: 12px; color: var(--accent); margin-right: 16px; font-weight: 600; min-width: 42px; }
        .chapter-name { flex: 1; font-size: 15px; }
        .chapter-status { font-size: 11px; padding: 4px 12px; background: rgba(255,107,53,0.15); color: var(--accent); border-radius: 4px; }
        footer { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }
    </style>
</head>
